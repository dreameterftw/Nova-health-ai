<!DOCTYPE html>
<html>
<head>
    <title>Ollama Connection Test</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; max-width: 800px; margin: 0 auto; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; }
        #result { margin-top: 20px; padding: 15px; border: 1px solid #ccc; border-radius: 5px; white-space: pre-wrap; }
        .error { background-color: #fee; border-color: #fcc; }
        .success { background-color: #efe; border-color: #cfc; }
    </style>
</head>
<body>
    <h1>Ollama Connection Test</h1>
    <p>Testing connection to: <strong id="url"></strong></p>
    <button onclick="testConnection()">Test Connection</button>
    <div id="result"></div>

    <script>
        const OLLAMA_HOST = 'https://equity-subdivision-facilitate-exploration.trycloudflare.com';
        document.getElementById('url').textContent = OLLAMA_HOST;

        async function testConnection() {
            const resultDiv = document.getElementById('result');
            resultDiv.textContent = 'Testing connection...';
            resultDiv.className = '';

            try {
                const response = await fetch(`${OLLAMA_HOST}/api/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        model: 'llama3.2',
                        messages: [
                            { role: 'user', content: 'Hello, just testing the connection. Reply with OK.' }
                        ],
                        stream: false
                    })
                });

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }

                const data = await response.json();
                resultDiv.textContent = `✓ SUCCESS!\n\nResponse: ${JSON.stringify(data, null, 2)}`;
                resultDiv.className = 'success';
            } catch (error) {
                resultDiv.textContent = `✗ ERROR\n\n${error.message}\n\nThis is likely a CORS issue. The Cloudflare tunnel needs to allow requests from this domain.`;
                resultDiv.className = 'error';
                console.error('Full error:', error);
            }
        }
    </script>
</body>
</html>
